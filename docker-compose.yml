
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  bot:
    build: .
    environment:
      # These will be passed in by the user when they run docker-compose
      - BOT_TOKEN=${BOT_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      # You might need to add this so your bot knows where Qdrant is!
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    restart: unless-stopped
    #volumes:
      # Optional: Mount local downloads/images so the bot can save/read them persistently
     # - ./downloads:/app/downloads
     # - ./images:/app/images

volumes:
  qdrant_storage:
